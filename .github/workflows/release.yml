name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build binary
        run: |
          pyinstaller --onefile --clean --name hawk \
            --hidden-import hawkeyes \
            --hidden-import hawkeyes.cli \
            --hidden-import hawkeyes.scanner \
            --hidden-import hawkeyes.banner \
            --hidden-import hawkeyes.utils.port_parser \
            --hidden-import hawkeyes.utils.services \
            --hidden-import hawkeyes.utils.banner_grabber \
            --hidden-import hawkeyes.utils.formatter \
            hawkeyes/cli.py
          cp dist/hawk "dist/hawk-linux-${{ matrix.arch }}"
          chmod +x "dist/hawk-linux-${{ matrix.arch }}"

      - uses: actions/upload-artifact@v4
        with:
          name: hawk-linux-${{ matrix.arch }}
          path: dist/hawk-linux-${{ matrix.arch }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          cp artifacts/hawk-linux-x86_64/hawk-linux-x86_64 release/
          cp artifacts/hawk-linux-aarch64/hawk-linux-aarch64 release/
          cp install.sh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/hawk-linux-x86_64
            release/hawk-linux-aarch64
            release/install.sh
          generate_release_notes: true
